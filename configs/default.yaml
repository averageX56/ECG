# configs/default.yaml
# Все гиперпараметры проекта ecg-multidataset.
# Пути датасетов — ТОЛЬКО здесь. В коде только cfg.paths.*

# ── Пути ─────────────────────────────────────────────────────────────────────
paths:
  # Kaggle: /kaggle/input/physionet2020
  # Локально: ~/data/physionet2020
  data_root:          ~/data/physionet2020
  ptbxl_root:         ~/data/ptb-xl
  mitbih_root:        ~/data/mit-bih
  cache_dir:          /tmp/ecg_cache
  results_dir:        results
  backbone_cache:     ~/.cache/ecg_backbone
  checkpoint_dir:     checkpoints

# ── Воспроизводимость ─────────────────────────────────────────────────────────
seed: 42

# ── Данные (общее) ────────────────────────────────────────────────────────────
data:
  sampling_strategy:  inv_sqrt    # inv_sqrt | uniform | dataset
  n_workers:          10
  pin_memory:         true
  prefetch_factor:    2
  augment_train:      true        # случайный crop-offset при аугментации

  # Источники PhysioNet 2020: пропустить при загрузке через iter_physionet2020
  # (PTBXL грузится отдельно через iter_ptbxl с fold-сплитом)
  skip_sources:
    - PTBXL
    - CPSC2018
    - CPSC-Extra

  # PTB-XL fold-split (менять только для ablation)
  ptbxl_fold_test:    10
  ptbxl_fold_val:     9

  # Минимальная достоверность SCP-кода в PTB-XL для включения метки
  ptbxl_min_likelihood: 0.0

# ── Backbone ──────────────────────────────────────────────────────────────────
backbone:
  n_leads:            12
  dropout:            0.3
  load_pretrained:    true
  pretrained_strict:  false       # strict=False: GAP и head не в Keras-весах

# ── Шаг 1: Pre-train ─────────────────────────────────────────────────────────
pretrain:
  batch_size:         64
  epochs:             50
  lr:                 1.0e-3
  weight_decay:       1.0e-4
  dropout_head:       0.5
  n_classes:          27          # PhysioNet 2020 scored классы
  grad_clip:          1.0         # max norm для gradient clipping
  # Early stopping по val macro-AUC
  patience:           10
  min_delta:          1.0e-4
  # BCE pos_weight: авто-вычисляется из train меток
  # (пропорция neg/pos по каждому классу)

# ── Шаг 2: Fine-tune CPSC ────────────────────────────────────────────────────
finetune:
  batch_size:         32
  epochs:             30
  lr_backbone:        1.0e-5      # размороженные блоки backbone
  lr_heads:           1.0e-4      # task-specific головы
  weight_decay:       1.0e-4
  dropout_head:       0.5
  patience:           7
  grad_clip:          1.0
  unfreeze_last_n:    2           # сколько последних ResBlocks размораживаем
  # Индексы классов для fine-tune (AF=0, VT=26 в 27-классовом vocab)
  target_class_indices:
    - 0    # AF:    SNOMED 164889003
    - 26   # VTach: SNOMED 164896001
  # Имя чекпоинта pretrain-шага для инициализации
  pretrain_checkpoint: pretrain_best.pt

# ── Beat Classifier: MIT-BIH (поток B) ───────────────────────────────────────
beat_clf:
  batch_size:         256
  epochs:             50
  lr:                 1.0e-3
  weight_decay:       1.0e-4
  dropout:            0.3
  patience:           10
  k_folds:            5           # пациент-стратифицированная CV по DS1
  n_classes:          5           # AAMI: N=0 S=1 V=2 F=3 Q=4
  conv_channels:      [32, 64, 128]
  kernel_size:        5

# ── Логирование ───────────────────────────────────────────────────────────────
logging:
  backend:            tensorboard  # tensorboard | wandb | none
  wandb_project:      ecg-multidataset
  wandb_entity:       null         # ваш W&B username / team
  wandb_tags:         []
  log_every_n_steps:  50
  level:              INFO
  save_preds:         true         # сохранять ли preds.npy на fold 10